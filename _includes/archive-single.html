<div class="case-card">

  <p class="case-category">
    {{ post.categories | join: ", " }}
  </p>

  <h2 class="case-title">
    <a href="{{ post.url }}">{{ post.title }}</a>
  </h2>

  <p class="case-excerpt">
    {{ post.excerpt }}
  </p>

  <p class="case-tags">
    {% for tag in post.tags %}
      <span class="tag">{{ tag }}</span>
    {% endfor %}
  </p>

</div>
